<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriVision AI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="nav-logo">
      🍽️ NutriVision AI
    </div>

    <button id="themeToggle" class="theme-btn">
      🌙
    </button>

  </nav>

  <!-- Main -->
  <div class="app">

    <!-- Left -->
    <div class="glass-card main-card">

      <div class="hero">

        <h1>Smart Nutrition Analysis</h1>

        <p>
          Upload food images and estimate calories instantly with AI
        </p>

      </div>

      <!-- Upload -->
      <label class="upload-box">

        <input type="file" id="foodImage" accept="image/*">

        <span>📸 Upload Food Image</span>

      </label>

      <img id="preview" class="preview hidden">

      <!-- Input -->
      <input
        type="text"
        id="foodName"
        placeholder="Describe your food..."
      >

      <!-- Button -->
      <button id="analyzeBtn" onclick="analyzeFood()">
        Analyze Nutrition
      </button>

      <!-- Loader -->
      <div id="loader" class="loader hidden"></div>

      <!-- Result -->
      <div id="resultCard" class="result hidden">

        <div id="resultText"></div>

      </div>

    </div>

    <!-- Right -->
    <div class="glass-card history-card">

      <div class="history-header">
        📊 Recent Analysis
      </div>

      <div id="historyList" class="history-list">

        <div class="empty-history">
          No analysis yet 🍽️
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
