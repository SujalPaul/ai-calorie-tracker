<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>NutriVision AI</title>

    <link
        rel="stylesheet"
        href="style.css"
    />

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <h1 class="logo">
            🍽 NutriVision AI
        </h1>

        <div class="nav-right">

            <span>Guest</span>

            <button class="logout-btn">
                Logout
            </button>

        </div>

    </nav>


    <!-- MAIN CONTAINER -->

    <div class="container">


        <!-- DASHBOARD -->

        <section class="dashboard glass-card">

            <h2>
                🔥 Daily Dashboard
            </h2>

            <div class="dashboard-content">

                <div class="calorie-circle">

                    <h1 id="caloriesValue">
                        0
                    </h1>

                    <p>kcal</p>

                </div>

                <div class="dashboard-stats">

                    <div class="stat-box">

                        <p>🎯 Goal</p>

                        <h3>2000 kcal</h3>

                    </div>

                    <div class="stat-box">

                        <p>🍽 Meals</p>

                        <h3 id="mealsValue">
                            0
                        </h3>

                    </div>

                    <div class="stat-box">

                        <p>⚡ Remaining</p>

                        <h3 id="remainingValue">
                            2000
                        </h3>

                    </div>

                    <div class="stat-box">

                        <p>🔥 Progress</p>

                        <h3 id="progressValue">
                            0%
                        </h3>

                    </div>

                </div>

            </div>

            <div class="progress-bar">

                <div class="progress-fill">

                </div>

            </div>

        </section>



        <!-- CHARTS -->

        <div class="charts-grid">

            <div class="card">
    <h3>📈 Calories Overview</h3>
    <canvas id="caloriesChart"></canvas>
</div>

            <div class="card">
    <h3>🥗 Macro Split</h3>
    <canvas id="macroChart"></canvas>
</div>

        </div>



       <!-- ANALYSIS GRID -->

<div class="analysis-grid">

    <!-- LEFT SIDE -->

    <section class="analysis-card glass-card">

        <h1>
            Smart Nutrition Analysis
        </h1>

        <p>
            Upload food images and estimate calories instantly with AI
        </p>

        <div class="upload-section">

            <!-- UPLOAD BUTTON -->

            <label
                for="foodImage"
                class="upload-box"
            >

                📸 Upload Food Image

            </label>

            <!-- FILE INPUT -->

            <input
                type="file"
                id="foodImage"
                accept="image/*"
                hidden
            >

            <!-- IMAGE PREVIEW -->

            <img
                id="previewImage"
                style="
                    display:none;
                    width:100%;
                    border-radius:20px;
                "
            >

            <!-- DESCRIPTION -->

            <textarea
                id="foodDescription"
                placeholder="Describe your food..."
            ></textarea>

            <!-- BUTTON -->

            <button id="analyzeBtn">

                Analyze Nutrition

            </button>

        </div>

        <!-- RESULTS -->

        <div id="resultContainer">

        </div>

    </section>


    <!-- RIGHT SIDE -->

    <section class="recent-card glass-card">

        <h2>
            📊 Recent Analysis
        </h2>

        <div id="recentAnalysis">

            <div class="recent-meal">

                No recent meals yet

            </div>

        </div>

    </section>

</div>
    <!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">

    </script>


    <!-- SCRIPT -->

    <script src="script.js">

    </script>

</body>

</html>
