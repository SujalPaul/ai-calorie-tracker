<!DOCTYPE html>
<html>
<head>
  <title>AI Calorie Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>🍽️ AI Calorie Tracker</h1>
      <p class="subtitle">Upload image + describe food</p>

      <input type="file" id="foodImage" accept="image/*">

      <img id="preview" class="hidden">

      <input type="text" id="foodName" placeholder="Describe the food (e.g. chicken biryani, paneer pizza)">

      <button onclick="analyzeFood()">Analyze Food</button>

      <div id="resultCard" class="result hidden">
        <h3>Result</h3>
        <p id="resultText"></p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
