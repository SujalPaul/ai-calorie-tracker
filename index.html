<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriVision AI</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-blur blur1"></div>
  <div class="bg-blur blur2"></div>

  <header>
    <h1>🍽 NutriVision AI</h1>

    <button class="theme-btn">
      🌙
    </button>
  </header>

  <main class="container">

    <section class="dashboard-card">
      <h2>🔥 Daily Dashboard</h2>

      <div class="dashboard-grid">

        <div class="dashboard-stat">
          <h3>Total Calories</h3>
          <p>
            <span id="totalCalories">0</span> kcal
          </p>
        </div>

        <div class="dashboard-stat">
          <h3>Meals</h3>
          <p id="mealCount">0</p>
        </div>

        <div class="dashboard-stat">
          <h3>Remaining</h3>
          <p>
            <span id="remainingCalories">2000</span> kcal
          </p>
        </div>

        <div class="dashboard-stat">
          <h3>Progress</h3>
          <p id="progressPercent">0%</p>
        </div>

      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <section class="main-grid">

      <div class="analyzer-card">

        <h2>Smart Nutrition Analysis</h2>

        <p class="subtitle">
          Upload food images and estimate calories instantly
        </p>

        <div class="upload-box">

          <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden
          />

          <label for="imageInput" class="upload-label">
            📸 Upload Food Image
          </label>

          <img id="imagePreview" />

          <input
            type="text"
            id="foodInput"
            placeholder="Describe your food..."
          />

          <button id="analyzeBtn">
            Analyze Nutrition
          </button>

        </div>

        <div id="result"></div>

      </div>

      <div class="history-card">

        <h2>📊 Recent Analysis</h2>

        <div id="historyList"></div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
