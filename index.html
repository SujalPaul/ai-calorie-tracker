<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NutriVision AI</title>

  <link rel="stylesheet" href="style.css"/>

</head>

<body>

  <div class="bg-blur blur1"></div>
  <div class="bg-blur blur2"></div>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      🍽️ NutriVision AI
    </div>

    <div class="nav-right">

      <span id="userName">
        Guest
      </span>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

  </nav>

  <!-- MAIN -->

  <main class="container">

    <!-- DASHBOARD -->

    <section class="dashboard card">

      <div class="dashboard-left">

        <div class="calorie-ring">

          <div class="ring-inner">

            <h1 id="totalCalories">
              0
            </h1>

            <p>kcal</p>

          </div>

        </div>

      </div>

      <div class="dashboard-right">

        <h2>
          🔥 Daily Dashboard
        </h2>

        <div class="stats-grid">

          <div class="stat-card">
            <span>🎯 Goal</span>
            <h3>2000 kcal</h3>
          </div>

          <div class="stat-card">
            <span>🍽 Meals</span>
            <h3 id="mealCount">0</h3>
          </div>

          <div class="stat-card">
            <span>⚡ Remaining</span>
            <h3 id="remainingCalories">
              2000
            </h3>
          </div>

          <div class="stat-card">
            <span>🔥 Progress</span>
            <h3 id="progressPercent">
              0%
            </h3>
          </div>

        </div>

        <div class="progress-track">

          <div
            class="progress-bar"
            id="progressBar"
          ></div>

        </div>

      </div>

    </section>

    <!-- ANALYSIS -->

    <section class="analysis-grid">

      <div class="analysis card">

        <h1>
          Smart Nutrition Analysis
        </h1>

        <p>
          Upload food images and estimate calories instantly with AI
        </p>

        <label class="upload-box">

          📸 Upload Food Image

          <input
            type="file"
            id="imageInput"
            hidden
          />

        </label>

        <img
          id="foodPreview"
          class="food-preview"
        />

        <input
          type="text"
          id="foodInput"
          placeholder="Describe your food..."
        />

        <button id="analyzeBtn">
          Analyze Nutrition
        </button>

        <div id="result"></div>

      </div>

      <!-- HISTORY -->

      <div class="history card">

        <h2>
          📊 Recent Analysis
        </h2>

        <div id="historyList"></div>

      </div>

    </section>

  </main>

  <!-- AUTH MODAL -->

  <div class="auth-modal" id="authModal">

    <div class="auth-card">

      <h1 id="authTitle">
        Login
      </h1>

      <input
        type="email"
        id="authEmail"
        placeholder="Enter email"
      />

      <input
        type="password"
        id="authPassword"
        placeholder="Enter password"
      />

      <button id="authBtn">
        Login
      </button>

      <p class="switch-auth">

        <span id="switchText">
          Don't have an account?
        </span>

        <span id="switchAuth">
          Signup
        </span>

      </p>

    </div>

  </div>

  <script
    type="module"
    src="script.js"
  ></script>

</body>
</html>
