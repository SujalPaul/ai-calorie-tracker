<body>

    <nav class="navbar">
        <div class="logo">🍽 NutriVision AI</div>

        <div class="nav-right">
            <span id="userName">Guest</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="main-container">

        <!-- DASHBOARD -->

        <div class="glass-card dashboard">

            <h1 class="dashboard-title">🔥 Daily Dashboard</h1>

            <div class="dashboard-grid">

                <div class="progress-ring">
                    <div class="progress-inner">
                        <h1 id="caloriesConsumed">0</h1>
                        <span>kcal</span>
                    </div>
                </div>

                <div>

                    <div class="stats-grid">

                        <div class="stat-box">
                            <p>🎯 Goal</p>
                            <h2>2000 kcal</h2>
                        </div>

                        <div class="stat-box">
                            <p>🍽 Meals</p>
                            <h2 id="mealCount">0</h2>
                        </div>

                        <div class="stat-box">
                            <p>⚡ Remaining</p>
                            <h2 id="remainingCalories">2000</h2>
                        </div>

                        <div class="stat-box">
                            <p>🔥 Progress</p>
                            <h2 id="progressPercent">0%</h2>
                        </div>

                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>

                </div>

            </div>

        </div>

        <!-- CONTENT -->

        <div class="content-grid">

            <!-- ANALYSIS -->

            <div class="glass-card analysis-card">

                <h1>Smart Nutrition Analysis</h1>

                <p>
                    Upload food images and estimate calories instantly with AI
                </p>

                <label for="imageInput" class="upload-box">
                    📸 Upload Food Image
                </label>

                <input
                    type="file"
                    id="imageInput"
                    hidden
                >

                <img
                    id="previewImage"
                    class="food-preview"
                    style="display:none;"
                >

                <input
                    type="text"
                    id="foodInput"
                    class="food-input"
                    placeholder="Describe your food..."
                >

                <button
                    class="analyze-btn"
                    id="analyzeBtn"
                >
                    Analyze Nutrition
                </button>

                <div id="result"></div>

            </div>

            <!-- RECENT -->

            <div class="glass-card recent-card">

                <h2>📊 Recent Analysis</h2>

                <div id="recentList"></div>

            </div>

        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>
