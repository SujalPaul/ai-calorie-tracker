<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriVision AI</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="background-blur blur1"></div>
  <div class="background-blur blur2"></div>

  <header>
    <h1>🍽️ NutriVision AI</h1>
  </header>

  <main class="dashboard-layout">

    <!-- DASHBOARD -->

    <section class="dashboard-card">

      <h2>🔥 Daily Dashboard</h2>

      <div class="dashboard-grid">

        <div class="dashboard-circle">
          <div class="circle-inner">
            <h1 id="totalCalories">0</h1>
            <p>kcal</p>
          </div>
        </div>

        <div class="dashboard-stats">

          <div class="stat-card">
            <span>🎯 Goal</span>
            <h3>2000 kcal</h3>
          </div>

          <div class="stat-card">
            <span>🍽 Meals</span>
            <h3 id="mealCount">0</h3>
          </div>

          <div class="stat-card">
            <span>⚡ Remaining</span>
            <h3 id="remainingCalories">2000</h3>
          </div>

          <div class="stat-card">
            <span>🔥 Progress</span>
            <h3 id="progressPercent">0%</h3>
          </div>

        </div>

      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </section>

    <!-- CHARTS -->

    <section class="charts-section">

      <div class="chart-card">
        <h2>📈 Calories Overview</h2>
        <canvas id="calorieChart"></canvas>
      </div>

      <div class="chart-card">
        <h2>🥗 Macro Split</h2>
        <canvas id="macroChart"></canvas>
      </div>

    </section>

    <!-- MAIN GRID -->

    <section class="main-grid">

      <!-- ANALYZER -->

      <div class="glass-card">

        <h1>Smart Nutrition Analysis</h1>

        <p class="subtitle">
          Upload food images and estimate calories instantly with AI
        </p>

        <label for="imageInput" class="upload-box">
          📸 Upload Food Image
        </label>

        <input type="file" id="imageInput" accept="image/*"/>

        <img id="imagePreview"/>

        <input
          type="text"
          id="foodInput"
          placeholder="Describe your food..."
        />

        <button id="analyzeBtn">
          Analyze Nutrition
        </button>

        <div id="result"></div>

      </div>

      <!-- HISTORY -->

      <div class="history-card">

        <h2>📊 Recent Analysis</h2>

        <div id="historyList"></div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
