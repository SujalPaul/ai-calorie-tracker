<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NutriVision AI</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- GLOW -->

  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="nav-logo">
      🍽️ NutriVision AI
    </div>

    <button
      id="themeToggle"
      class="theme-btn"
    >
      🌙
    </button>

  </nav>

  <!-- APP -->

  <div class="app">

    <!-- DASHBOARD -->

    <div class="glass-card dashboard-card">

      <div class="dashboard-left">

        <div class="ring-wrapper">

          <svg
            class="progress-ring"
            width="180"
            height="180"
          >

            <circle
              class="ring-bg"
              cx="90"
              cy="90"
              r="70"
            ></circle>

            <circle
              class="ring-progress"
              id="ringProgress"
              cx="90"
              cy="90"
              r="70"
            ></circle>

          </svg>

          <div class="ring-center">

            <h2 id="ringCalories">
              0
            </h2>

            <span>kcal</span>

          </div>

        </div>

      </div>

      <div class="dashboard-right">

        <h2>
          🔥 Daily Dashboard
        </h2>

        <div class="stats-grid">

          <div class="stat-card">

            <h3>🎯 Goal</h3>

            <p>2000 kcal</p>

          </div>

          <div class="stat-card">

            <h3>🍽️ Meals</h3>

            <p id="mealCount">0</p>

          </div>

          <div class="stat-card">

            <h3>⚡ Remaining</h3>

            <p id="remainingCalories">
              2000 kcal
            </p>

          </div>

          <div class="stat-card">

            <h3>🔥 Progress</h3>

            <p id="progressPercent">
              0%
            </p>

          </div>

        </div>

      </div>

    </div>

    <!-- LEFT COLUMN -->

    <div class="left-column">

      <!-- MAIN -->

      <div class="glass-card main-card">

        <div class="hero">

          <h1>
            Smart Nutrition Analysis
          </h1>

          <p>
            Upload food images and estimate calories instantly with AI
          </p>

        </div>

        <!-- UPLOAD -->

        <label class="upload-box">

          <input
            type="file"
            id="foodImage"
            accept="image/*"
          >

          <span>
            📸 Upload Food Image
          </span>

        </label>

        <!-- PREVIEW -->

        <img
          id="preview"
          class="preview hidden"
        >

        <!-- FOOD INPUT -->

        <input
          type="text"
          id="foodName"
          placeholder="Describe your food..."
        >

        <!-- BUTTON -->

        <button
          id="analyzeBtn"
          onclick="analyzeFood()"
        >
          Analyze Nutrition
        </button>

        <!-- LOADER -->

        <div
          id="loader"
          class="loader hidden"
        ></div>

        <!-- RESULT -->

        <div
          id="resultCard"
          class="result hidden"
        >

          <div id="resultText"></div>

        </div>

      </div>

    </div>

    <!-- HISTORY -->

    <div class="glass-card history-card">

      <div class="history-header">
        📊 Recent Analysis
      </div>

      <div
        id="historyList"
        class="history-list"
      >

        <div class="empty-history">
          No analysis yet 🍽️
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
