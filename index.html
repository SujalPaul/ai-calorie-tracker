<!DOCTYPE html>
<html>
<head>
  <title>AI Calorie Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="themeToggle">🌙</button>

  <div class="container">
    <div class="card">

      <h1 id="title">🍽️ AI Calorie Tracker</h1>
      <p class="subtitle">Upload image + describe food</p>

      <input type="file" id="foodImage" accept="image/*">

      <img id="preview" class="hidden">

      <input type="text" id="foodName" placeholder="e.g. chicken biryani, paneer pizza">

      <button onclick="analyzeFood()">Analyze Food</button>

      <div id="loader" class="loader hidden"></div>

      <div id="resultCard" class="result hidden">
        <div id="resultText"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
