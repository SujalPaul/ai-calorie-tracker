<!DOCTYPE html>
<html>
<head>
  <title>AI Calorie Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>🍽️ AI Calorie Tracker</h1>
      <p class="subtitle">Enter a food and get nutrition instantly</p>

      <input type="text" id="foodName" placeholder="e.g. Pizza, Burger, Rice">

      <button onclick="analyzeFood()">Analyze Food</button>

      <div id="resultCard" class="result hidden">
        <h3>Result</h3>
        <p id="resultText"></p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
